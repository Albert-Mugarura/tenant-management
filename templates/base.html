<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tenant Management - Alinaitwe Joseph{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; color: #333; }
        .navbar { background: #1a73e8; padding: 12px 20px; color: white; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .navbar-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .navbar-top h1 { font-size: 1.1em; font-weight: 600; }
        .navbar-top .logout { color: white; text-decoration: none; padding: 6px 14px; border: 1px solid rgba(255,255,255,0.4); border-radius: 20px; font-size: 0.85em; transition: all 0.3s; }
        .navbar-top .logout:hover { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.7); }
        .navbar nav { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; }
        .navbar nav a { color: white; text-decoration: none; padding: 8px 16px; border-radius: 20px; font-size: 0.85em; white-space: nowrap; transition: background 0.3s; background: rgba(255,255,255,0.1); }
        .navbar nav a:hover { background: rgba(255,255,255,0.25); }
        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        .card { background: white; border-radius: 10px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .card h2 { color: #1a73e8; margin-bottom: 15px; font-size: 1.2em; border-bottom: 2px solid #e0e0e0; padding-bottom: 10px; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: white; border-radius: 10px; padding: 15px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .stat-card h3 { color: #666; font-size: 0.8em; margin-bottom: 8px; }
        .stat-card .value { font-size: 1.4em; font-weight: bold; }
        .stat-card.green .value { color: #34a853; }
        .stat-card.blue .value { color: #1a73e8; }
        .stat-card.red .value { color: #ea4335; }
        .stat-card.orange .value { color: #fbbc04; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9em; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #e0e0e0; }
        th { background: #f8f9fa; font-weight: 600; color: #555; font-size: 0.85em; }
        tr:hover { background: #f8f9fa; }
        .btn { display: inline-block; padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9em; text-decoration: none; transition: all 0.3s; }
        .btn-primary { background: #1a73e8; color: white; }
        .btn-primary:hover { background: #1557b0; }
        .btn-success { background: #34a853; color: white; }
        .btn-success:hover { background: #2d8e47; }
        .btn-danger { background: #ea4335; color: white; }
        .btn-danger:hover { background: #d33426; }
        .btn-warning { background: #fbbc04; color: #333; }
        .btn-warning:hover { background: #e5ac00; }
        .btn-sm { padding: 5px 10px; font-size: 0.8em; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; }
        .form-group input, .form-group select { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.95em; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #1a73e8; box-shadow: 0 0 0 2px rgba(26,115,232,0.2); }
        .badge { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 0.75em; font-weight: 600; }
        .badge-danger { background: #fce8e6; color: #ea4335; }
        .badge-warning { background: #fef7e0; color: #f9a825; }
        .badge-success { background: #e6f4ea; color: #34a853; }
        .flash { padding: 10px 15px; border-radius: 6px; margin-bottom: 15px; }
        .flash-success { background: #e6f4ea; color: #34a853; border: 1px solid #34a853; }
        .flash-error { background: #fce8e6; color: #ea4335; border: 1px solid #ea4335; }
        .empty-state { text-align: center; padding: 30px; color: #999; }
        .actions { display: flex; gap: 8px; flex-wrap: wrap; }
        @media (min-width: 768px) {
            .navbar-top h1 { font-size: 1.3em; }
            .stats-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="navbar-top">
            <h1>Tenant Management</h1>
            <a href="{{ url_for('logout') }}" class="logout">Logout</a>
        </div>
        <nav>
            <a href="{{ url_for('index') }}">Dashboard</a>
            <a href="{{ url_for('tenants_list') }}">Tenants</a>
            <a href="{{ url_for('reminders_view') }}">Reminders</a>
            <a href="{{ url_for('search_view') }}">Search</a>
            <a href="{{ url_for('summary_view') }}">Summary</a>
        </nav>
    </div>
    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
